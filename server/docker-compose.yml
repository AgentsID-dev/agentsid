services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: agentsid
      POSTGRES_PASSWORD: agentsid_local
      POSTGRES_DB: agentsid
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentsid -d agentsid"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
